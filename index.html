const loadPdfLib = () => new Promise((resolve, reject) => {
  if (window.PDFLib) return resolve();
  const s = document.createElement("script");
  s.src = "https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js";
  s.onload = resolve; s.onerror = reject;
  document.head.appendChild(s);
});

const generatePDF = async (schicht, fahrzeug, besatzung, entries) => {
  await loadPdfLib();
  const { PDFDocument } = PDFLib;

  // Load the original template
  const templateBytes = Uint8Array.from(atob(PDF_TEMPLATE_B64), c => c.charCodeAt(0));
  const pdfDoc = await PDFDocument.load(templateBytes);
  const form = pdfDoc.getForm();

  // Fill header fields
  const now = new Date();
  const dateStr = now.toLocaleDateString("de-DE", {day:"2-digit",month:"2-digit",year:"numeric"});

  form.getTextField("Text2").setText(dateStr);          // Datum
  form.getTextField("Text3").setText(fahrzeug || "");    // FZG
  form.getTextField("Text4").setText(schicht || "");     // Schichtbezeichnung
  form.getTextField("Text1").setText(besatzung || "");   // Besatzung

  // Fill row fields (1-14)
  for (let i = 0; i < 14; i++) {
    const entry = entries[i];
    const rowNum = i + 1;

    // ILS Nr
    try { form.getTextField("ILS Nr" + rowNum).setText(entry?.ilsNr || ""); } catch(e) {}

    // Patienten Name
    try {
      if (rowNum === 1) {
        form.getTextField("Patienten Name1.0").setText(entry?.name || "");
      } else {
        form.getTextField("Patienten Name" + rowNum).setText(entry?.name || "");
      }
    } catch(e) {}

    // Bemerkung (all rows use Patienten Name1.1.X where X = row index 0-13)
    try { form.getTextField("Patienten Name1.1." + i).setText(entry?.bemerkung || ""); } catch(e) {}

    // Checkbox (Kontrollkästchen6.0 through .13)
    try {
      const cb = form.getCheckBox("Kontrollk\u00e4stchen6." + i);
      if (entry?.nadok) cb.check(); else cb.uncheck();
    } catch(e) {
      // Try accessing via parent
      try {
        const cb = form.getCheckBox("Kontrollkästchen6." + i);
        if (entry?.nadok) cb.check(); else cb.uncheck();
      } catch(e2) {}
    }
  }

  // Flatten so it looks clean when printed (optional - remove if you want editable fields)
  form.flatten();

  // Save and download
  const pdfBytes = await pdfDoc.save();
  const blob = new Blob([pdfBytes], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Fakturaliste_" + (schicht || "Schicht") + "_" + dateStr.replace(/\./g, "-") + ".pdf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

function EntryForm({ onAdd, onUpdate, onCancelEdit, count, editingEntry, editingIndex }) {
  const isEditing = editingEntry != null;
  const [ilsNr, setIlsNr] = useState("");
  const [name, setName] = useState("");
  const [bemerkung, setBemerkung] = useState("");
  const [nadok, setNadok] = useState(false);
  const [focused, setFocused] = useState(null);
  const ilsRef = useRef(null);
  const formRef = useRef(null);

  useEffect(() => {
    if (editingEntry) {
      setIlsNr(editingEntry.ilsNr||""); setName(editingEntry.name||"");
      setBemerkung(editingEntry.bemerkung||""); setNadok(editingEntry.nadok||false);
      formRef.current?.scrollIntoView({behavior:"smooth",block:"start"});
    } else {
      setIlsNr(""); setName(""); setBemerkung(""); setNadok(false);
    }
  }, [editingEntry]);

  const handleSubmit = () => {
    if (!name.trim()) return;
    const data = {ilsNr:ilsNr.trim(),name:name.trim(),bemerkung:bemerkung.trim(),nadok};
    if (isEditing) onUpdate(editingIndex, data); else onAdd(data);
    setIlsNr(""); setName(""); setBemerkung(""); setNadok(false);
    if (!isEditing) ilsRef.current?.focus();
  };

  return (
    <div ref={formRef} style={{background:C.card,borderRadius:16,padding:"20px",boxShadow:C.shadow,marginBottom:16,border:isEditing?`2px solid ${C.red}`:"2px solid transparent",transition:"border-color 0.2s"}}>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={labelStyle}>ILS Nr.</label>
          <input ref={ilsRef} style={{...inputStyle,borderColor:focused==="i"?C.red:C.border,boxShadow:focused==="i"?`0 0 0 3px ${C.redLight}`:"none"}} placeholder="Einsatznr." value={ilsNr} onChange={e=>setIlsNr(e.target.value)} onFocus={()=>setFocused("i")} onBlur={()=>setFocused(null)}/>
        </div>
        <div>
          <label style={labelStyle}>Handgeschr. Nadok</label>

            Ja

        </div>
      </div>

        <label style={labelStyle}>Patienten Name *</label>
        <input style={{...inputStyle,borderColor:focused==="n"?C.red:C.border,boxShadow:focused==="n"?`0 0 0 3px ${C.redLight}`:"none"}} placeholder="Nachname, Vorname" value={name} onChange={e=>setName(e.target.value)} onFocus={()=>setFocused("n")} onBlur={()=>setFocused(null)}/>

        <div style={{display:"flex",gap:10}}>
          <button style={{...btnPrimary,flex:1,background:C.textSec,fontSize:15}} onClick={()=>{setIlsNr("");setName("");setBemerkung("");setNadok(false);onCancelEdit();}}>Abbrechen</button>
          <button style={{...btnPrimary,flex:2,opacity:name.trim()?1:0.4,pointerEvents:name.trim()?"auto":"none"}} onClick={handleSubmit}>Speichern ✓</button>
        </div>
      ) : (
        <button style={{...btnPrimary,opacity:name.trim()?1:0.4,pointerEvents:name.trim()?"auto":"none"}} onClick={handleSubmit}>Einsatz hinzufügen +</button>
      )}
    </div>
  );
}

// ── Entry Card ──
function EntryCard({ entry, index, onDelete, onEdit, isActive }) {
  return (
    <div onClick={()=>onEdit(index)} style={{background:C.card,borderRadius:14,padding:"14px 16px",boxShadow:C.shadow,display:"flex",alignItems:"flex-start",gap:14,animation:"slideIn 0.3s ease-out",cursor:"pointer",border:isActive?`2px solid ${C.red}`:"2px solid transparent",transition:"border-color 0.2s",WebkitTapHighlightColor:"transparent"}}>
      <div style={{minWidth:36,height:36,borderRadius:10,background:C.redLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:C.red,fontFamily:font}}>{index+1}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:font,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{entry.name}</div>
        {entry.ilsNr && <div style={{fontSize:12,color:C.textSec,fontFamily:font}}>ILS: {entry.ilsNr}</div>}
        {entry.bemerkung && <div style={{fontSize:12,color:C.textSec,fontFamily:font,marginTop:4,lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{entry.bemerkung}</div>}
        <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
          {entry.nadok && <span style={{fontSize:10,fontWeight:700,color:C.red,background:C.redLight,padding:"2px 8px",borderRadius:6,fontFamily:font}}>NADOK: Ja</span>}
          <span style={{fontSize:10,color:"#bbb",fontFamily:font,marginLeft:"auto"}}>Tippen zum Bearbeiten</span>
        </div>
      </div>
      <button onClick={e=>{e.stopPropagation();onDelete(index)}} style={{background:"none",border:"none",color:"#ccc",fontSize:18,cursor:"pointer",padding:"4px 8px",borderRadius:8}}>✕</button>
    </div>
  );
}

// ── Main Screen ──
function MainScreen({ config, onFinish }) {
  const [entries, setEntries] = useState(() => {
    try { const s = localStorage.getItem("drk_entries"); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [editingIndex, setEditingIndex] = useState(null);

  // Auto-save entries on every change
  useEffect(() => { try { localStorage.setItem("drk_entries", JSON.stringify(entries)); } catch {} }, [entries]);

  const sortByIlsNr = arr => [...arr].sort((a,b) => { const na=parseInt(a.ilsNr),nb=parseInt(b.ilsNr); if(!isNaN(na)&&!isNaN(nb)) return na-nb; return (a.ilsNr||"").localeCompare(b.ilsNr||""); });
  const addEntry = e => { if(entries.length<14) setEntries(sortByIlsNr([...entries,e])); };
  const updateEntry = (i,d) => { setEntries(sortByIlsNr(entries.map((e,j)=>j===i?d:e))); setEditingIndex(null); };
  const deleteEntry = i => {
    setEntries(entries.filter((_,j)=>j!==i));
    if(editingIndex===i) setEditingIndex(null);
    else if(editingIndex!=null&&i<editingIndex) setEditingIndex(editingIndex-1);
  };
  return (
    <div style={{minHeight:"100dvh",background:C.bg,display:"flex",flexDirection:"column"}}>
      <div style={{background:`linear-gradient(145deg,${C.red} 0%,${C.redDark} 100%)`,padding:"52px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",fontFamily:font,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{config.fahrzeug}</div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:font,letterSpacing:"-0.01em"}}>{config.schicht}</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:800,color:"#fff",fontFamily:font}}>{entries.length}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontFamily:font,fontWeight:600}}>EINSÄTZE</div>
        </div>
      </div>
      <div style={{padding:"16px 16px 120px",flex:1}}>
        {(entries.length<14||editingIndex!=null) && <EntryForm onAdd={addEntry} onUpdate={updateEntry} onCancelEdit={()=>setEditingIndex(null)} count={entries.length} editingEntry={editingIndex!=null?entries[editingIndex]:null} editingIndex={editingIndex}/>}
        {entries.length>0 && <>
          <div style={{fontSize:13,fontWeight:600,color:C.textSec,fontFamily:font,textTransform:"uppercase",letterSpacing:"0.04em",margin:"8px 4px 10px"}}>Erfasste Einsätze</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {entries.map((e,i)=><EntryCard key={i} entry={e} index={i} onDelete={deleteEntry} onEdit={idx=>setEditingIndex(idx)} isActive={editingIndex===i}/>)}
          </div>
        </>}
        {entries.length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:C.textSec,fontFamily:font}}>
          <div style={{fontSize:40,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,fontWeight:600}}>Noch keine Einsätze</div>
          <div style={{fontSize:13,marginTop:4}}>Erfasse oben deinen ersten Einsatz</div>
        </div>}
      </div>
      {entries.length>0 && <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px",paddingBottom:"max(12px, env(safe-area-inset-bottom))",background:"rgba(247,247,248,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`}}>
        <button style={btnSecondary} onClick={async()=>{await generatePDF(config.schicht,config.fahrzeug,config.besatzung,entries);onFinish();}}>Schicht abschließen · PDF erstellen ↓</button>
      </div>}
      <style>{`@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

// ── Success Screen ──
function SuccessScreen({ onReset, onBack }) {
  return (
    <div style={{minHeight:"100dvh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
      <div style={{width:80,height:80,borderRadius:24,background:C.accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:24}}>✅</div>
      <h2 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:font,margin:"0 0 8px"}}>PDF erstellt!</h2>
      <p style={{fontSize:15,color:C.textSec,fontFamily:font,margin:"0 0 32px",lineHeight:1.5}}>Die Fakturaliste wurde als PDF heruntergeladen und kann jetzt weitergegeben werden.</p>
      <button style={{...btnSecondary,maxWidth:280,marginBottom:12}} onClick={onBack}>Zurück zu den Einsätzen</button>
      <button style={{...btnPrimary,maxWidth:280}} onClick={onReset}>Neue Schicht starten</button>
    </div>
  );
}

// ── App ──
function App() {
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem("drk_screen") || "setup"; } catch { return "setup"; }
  });
  const [config, setConfig] = useState(() => {
    try { const s = localStorage.getItem("drk_config"); return s ? JSON.parse(s) : null; } catch { return null; }
  });

  // Persist screen + config
  useEffect(() => { try { localStorage.setItem("drk_screen", screen); } catch {} }, [screen]);
  useEffect(() => { try { localStorage.setItem("drk_config", JSON.stringify(config)); } catch {} }, [config]);

  const handleReset = () => {
    setConfig(null); setScreen("setup");
    try { localStorage.removeItem("drk_entries"); localStorage.removeItem("drk_config"); localStorage.removeItem("drk_screen"); } catch {}
  };

  return (
    <div style={{maxWidth:430,margin:"0 auto",fontFamily:font}}>
      {screen==="setup" && <SetupScreen onStart={c=>{setConfig(c);setScreen("main")}}/>}
      {screen==="main" && config && <MainScreen config={config} onFinish={()=>setScreen("success")}/>}
      {screen==="success" && <SuccessScreen onReset={handleReset} onBack={()=>setScreen("main")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
